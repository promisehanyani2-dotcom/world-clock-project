<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World clock - Promise Hanyani</title>
  </head>
  <body>
    <div class="container">
      <h1><a href="index.html"> World Clocks</a></h1>

      <select name="" id="city-select">
        <option value="">Select a city</option>
        <option value="current">My current location</option>
        <option value="Africa/Gaborone">Botswana</option>
        <option value="Africa/Lusaka">Zambia</option>
        <option value="Africa/Luanda">Angola</option>
      </select>
      <div id="cities">
        <div class="city" id="south-africa">
          <div>
            <h2>South Africa</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="zimbabwe">
          <div>
            <h2>Zimbabwe</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>
    <footer>
      This is a world clock project created by💓<a
        href="https://github.com/promisehanyani2-dotcom"
      >
        <strong>Promise Hanyani</strong>
      </a>
      and is open sourced on
      <a href="https://github.com/promisehanyani2-dotcom/world-clock-project"
        >GitHub</a
      >
      and hosted on <a href="https://promysworldclock.netlify.app/">Netlify.</a>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
