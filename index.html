<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>World clock - Promise Hanyani</title>
  </head>
  <body>
    <div class="container">
      <h1>World clocks</h1>

      <select name="" id="">
        <option value="">Select a city</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">Auckland</option>
      </select>

      <div>
        <h2>London</h2>
        <div class="date">May 13th 2026</div>
        <div class="time">3:30:10 PM</div>
      </div>
      <div>
        <h2>Paris</h2>
        <div class="date">May 13th 2026</div>
        <div class="time">3:30:10 PM</div>
      </div>
    </div>
    <footer>
      This is a world clock project created by💓<a
        href="https://github.com/promisehanyani2-dotcom"
      >
        Promise Hanyani</a
      >
      and is open sourced on
      <a href="https://github.com/promisehanyani2-dotcom/world-clock-project"
        >GitHub</a
      >
      and hosted on <a href="https://promysworldclock.netlify.app/">Netlify.</a>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
